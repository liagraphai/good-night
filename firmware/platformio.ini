; PlatformIO Configuration for Good-Night M5StopWatch
; ESP32-S3 + 16MB Flash + 8MB OPI-PSRAM + USB CDC

[env:m5stopwatch]
platform = espressif32
board = m5stack-cores3
framework = arduino
monitor_speed = 115200
upload_port = COM5
monitor_port = COM5
upload_speed = 460800

; 烧录后不要用 RTS 复位（会导致 ESP32-S3 进入下载模式）
upload_flags =
    --after
    no_reset

; 关键：M5StopWatch 的 PSRAM 必须以 OPI 模式初始化，否则屏幕不亮
board_build.arduino.memory_type = qio_opi

lib_deps =
    m5stack/M5Unified@^0.2.0
    bblanchon/ArduinoJson@^7.0.0

; 排除不兼容的可选依赖
lib_ignore = DFRobot_GP8XXX
